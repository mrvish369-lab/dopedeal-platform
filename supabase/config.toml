project_id = "oyvumfznbsidngombidu"

[auth]
# JWT tokens expire after 2 weeks (1209600 seconds)
# Refresh tokens expire after 60 days
jwt_expiry = 1209600
# Enable automatic token refresh
enable_signup = true
enable_anonymous_sign_ins = false

[functions.extract-offer-details]
verify_jwt = false

[functions.generate-button-name]
verify_jwt = false

[functions.send-otp]
verify_jwt = false

[functions.verify-otp]
verify_jwt = false

# Transactional email — called server-side after auth
[functions.send-email]
verify_jwt = false

# Telegram OTP functions — no JWT required (called before user is authenticated)
[functions.generate-telegram-token]
verify_jwt = false

[functions.telegram-webhook]
verify_jwt = false
